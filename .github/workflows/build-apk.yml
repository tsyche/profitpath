name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build --omit=dev

      - name: Set up Capacitor
        run: npx cap sync android

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Get version from package.json
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/profitpath-v${{ steps.version.outputs.value }}.${{ github.run_number }}.apk

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profitpath-v${{ steps.version.outputs.value }}.${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Create Pre-release (on main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          tag_name: v${{ steps.version.outputs.value }}.${{ github.run_number }}
          name: v${{ steps.version.outputs.value }} (build ${{ github.run_number }})
          body: "Beta build — v${{ steps.version.outputs.value }}, CI run #${{ github.run_number }}"
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
