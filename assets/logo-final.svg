<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72" aria-hidden="true" focusable="false">
    <defs>
        <linearGradient id="sunGradient" x1="0" x2="1">
            <stop offset="0%" stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#f59e0b"/>
        </linearGradient>
        <linearGradient id="pathGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6366f1" opacity="0.6"/>
            <stop offset="100%" stop-color="#4f46e5" opacity="0.2"/>
        </linearGradient>
    </defs>

    <!-- Path/road going into distance with perspective -->
    <g>
        <!-- Left edge of path -->
        <path d="M30 38 L45 60" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>
        <!-- Right edge of path -->
        <path d="M90 38 L75 60" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>
        <!-- Path fill getting narrower -->
        <polygon points="30,38 90,38 75,60 45,60" fill="url(#pathGradient)"/>
        <!-- Horizon line -->
        <line x1="35" y1="48" x2="85" y2="48" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
    </g>

    <!-- Rising sun -->
    <g>
        <!-- Sun glow -->
        <circle cx="60" cy="18" r="24" fill="url(#sunGradient)" opacity="0.15"/>
        <!-- Sun circle -->
        <circle cx="60" cy="28" r="18" fill="url(#sunGradient)"/>
        <!-- Sun rays -->
        <line x1="60" y1="6" x2="60" y2="0" stroke="url(#sunGradient)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="85" y1="10" x2="90" y2="4" stroke="url(#sunGradient)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="95" y1="28" x2="102" y2="28" stroke="url(#sunGradient)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="35" y1="10" x2="30" y2="4" stroke="url(#sunGradient)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="25" y1="28" x2="18" y2="28" stroke="url(#sunGradient)" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Wordmark -->
    <text x="0" y="68" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-weight="700" font-size="26" fill="#1f2937" letter-spacing="-0.5">ProfitPath</text>
</svg>
