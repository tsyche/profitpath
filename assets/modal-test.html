<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Test</title>
    <script type="module">
        import { createSimpleModal, showSimpleNotification, showSimpleConfirmation } from './components/SimpleModal.js';

        // Test 1: Create a simple modal
        function testModal() {
            const modal = createSimpleModal({
                title: 'Test Modal',
                content: 'This is a test modal with a simple design.',
                buttons: [
                    { text: 'Cancel', action: () => console.log('Cancel clicked'), primary: false },
                    { text: 'OK', action: () => console.log('OK clicked'), primary: true }
                ],
                size: 'medium'
            });
            console.log('Modal created successfully');
        }

        // Test 2: Test notification system
        function testNotification() {
            showSimpleNotification('This is a test notification', 'info');
            console.log('Notification shown');
        }

        // Test 3: Test confirmation dialog
        function testConfirmation() {
            showSimpleConfirmation(
                'Test Confirmation',
                'This is a test confirmation dialog',
                () => console.log('Confirmation accepted'),
                () => console.log('Confirmation cancelled')
            );
            console.log('Confirmation dialog shown');
        }

        // Run tests
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Modal test page loaded');
            testModal();
            setTimeout(testNotification, 2000);
            setTimeout(testConfirmation, 4000);
        });
    </script>
</head>
<body>
    <h1>Modal Test Page</h1>
    <p>This page tests the modal functionality.</p>
</body>
</html>
